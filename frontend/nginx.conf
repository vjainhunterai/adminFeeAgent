# =========================================================
# Nginx config — runs INSIDE the frontend container
# =========================================================
# WHAT THIS DOES:
#   /           → serves the React static files (index.html, JS, CSS)
#   /api/*      → forwards to the backend container on port 8000
#   try_files   → all unknown routes go to index.html (React Router)
# =========================================================

server {
    listen 80;
    server_name _;

    # --- Serve React static files ---
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
        #          ↑ This is important for React Router
        #            Any URL like /analysis or /status will
        #            load index.html and React handles routing
    }

    # --- Forward API calls to backend container ---
    location /api/ {
        proxy_pass         http://backend:8000;
        #                   ↑ "backend" = docker-compose service name
        #                     Docker networking resolves this automatically
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        #                   ↑ LLM calls can be slow, wait up to 2 minutes
    }
}
